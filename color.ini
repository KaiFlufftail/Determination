; Undertale black-and-white color scheme for the Determination theme.
; Pure-black void, white text and text-box borders (borders set in user.css),
; neutral grays for hover/disabled states. The only color is the red Soul
; progress handle, which comes from the sprite embedded in user.css.

[Determination]
text                = ffffff
subtext             = b3b3b3
main                = 000000
main-elevated       = 000000
highlight           = 141414
highlight-elevated  = 1f1f1f
sidebar             = 000000
player              = 000000
card                = 000000
shadow              = 000000
selected-row        = ffffff
button              = ffffff
button-active       = c8c8c8
button-disabled     = 4a4a4a
tab-active          = ffffff
notification        = ffffff
notification-error  = ff2b2b
misc                = 8a8a8a
